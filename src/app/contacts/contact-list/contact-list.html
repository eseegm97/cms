<div class="panel panel-default">
	<div class="panel-heading clearfix">
		<h3 class="panel-title pull-left">Contacts</h3>
		<a href="#" class="btn btn-primary pull-right" role="button">New Contact</a>
	</div>

	<div class="panel-body">
		<div class="list-group">
			<a
				href="#"
				class="list-group-item clearfix"
				*ngFor="let contact of contacts"
			>
				<div class="pull-left">
					<h4 class="list-group-item-heading">{{ contact.name }}</h4>
				</div>
				<span class="pull-right">
					<img
						src="{{ contact.imageUrl }}"
						alt="{{ contact.name }}"
						class="img-responsive img-rectangle contact-image"
					/>
				</span>
			</a>
		</div>
	</div>
</div>
